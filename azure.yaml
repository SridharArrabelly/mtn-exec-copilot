# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: mtn-exec-copilot
metadata:
  template: mtn-exec-copilot@1.0.0

infra:
  provider: bicep
  path: infra
  module: main

services:
  web:
    project: .
    language: python
    host: containerapp
    docker:
      path: Dockerfile
      context: .
      remoteBuild: true

hooks:
  # Greenfield: provision the Foundry agent so the first deploy is functional
  # without manual steps. --if-missing makes the hook idempotent on brownfield
  # deploys (agent already has versions -> skip, preserves portal edits).
  # Set SKIP_AGENT_SETUP=true to opt out entirely.
  # AI Search index seeding is intentionally NOT run here - it is slow, data-
  # heavy, and destructive on re-runs (see scripts/setup_aisearch_index.py).
  postprovision:
    windows:
      shell: pwsh
      run: |
        Write-Host "Provision complete. App URL: $env:SERVICE_APP_URI"
        Write-Host "Foundry endpoint: $env:AZURE_VOICELIVE_ENDPOINT"
        if ($env:SKIP_AGENT_SETUP -eq "true") {
          Write-Host "SKIP_AGENT_SETUP=true; skipping Foundry agent provisioning." -ForegroundColor Yellow
        } else {
          Write-Host "Provisioning Foundry agent (if missing)..." -ForegroundColor Cyan
          uv run python scripts/setup_foundry_agent.py --if-missing
        }
        Write-Host ""
        Write-Host "Manual follow-up:" -ForegroundColor Yellow
        Write-Host "  Populate the AI Search index: uv run python scripts/setup_aisearch_index.py"
    posix:
      shell: sh
      run: |
        echo "Provision complete. App URL: $SERVICE_APP_URI"
        echo "Foundry endpoint: $AZURE_VOICELIVE_ENDPOINT"
        if [ "$SKIP_AGENT_SETUP" = "true" ]; then
          echo "SKIP_AGENT_SETUP=true; skipping Foundry agent provisioning."
        else
          echo "Provisioning Foundry agent (if missing)..."
          uv run python scripts/setup_foundry_agent.py --if-missing
        fi
        echo ""
        echo "Manual follow-up:"
        echo "  Populate the AI Search index: uv run python scripts/setup_aisearch_index.py"