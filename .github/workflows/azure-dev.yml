name: Deploy to Azure (azd)

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  id-token: write   # OIDC federated login
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME:        ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION:        ${{ vars.AZURE_LOCATION }}
      AZURE_RESOURCE_GROUP_NAME: ${{ vars.AZURE_RESOURCE_GROUP_NAME }}

      # ── BYO resource overrides (optional GitHub Variables) ──
      # When all three FOUNDRY_* are set, the deployment reuses an existing Foundry
      # account/project instead of provisioning a new one. Same pattern for SEARCH_*.
      FOUNDRY_ACCOUNT_NAME:        ${{ vars.FOUNDRY_ACCOUNT_NAME }}
      FOUNDRY_RESOURCE_GROUP:      ${{ vars.FOUNDRY_RESOURCE_GROUP }}
      FOUNDRY_PROJECT_ENDPOINT:    ${{ vars.FOUNDRY_PROJECT_ENDPOINT }}
      SEARCH_SERVICE_NAME:         ${{ vars.SEARCH_SERVICE_NAME }}
      SEARCH_RESOURCE_GROUP:       ${{ vars.SEARCH_RESOURCE_GROUP }}
      APPINSIGHTS_NAME:            ${{ vars.APPINSIGHTS_NAME }}
      APPINSIGHTS_RESOURCE_GROUP:  ${{ vars.APPINSIGHTS_RESOURCE_GROUP }}

      # ── App config (optional GitHub Variables) ──
      AGENT_NAME:            ${{ vars.AGENT_NAME }}
      AGENT_PROJECT_NAME:    ${{ vars.AGENT_PROJECT_NAME }}
      SEARCH_CONNECTION_NAME:${{ vars.SEARCH_CONNECTION_NAME }}
      SEARCH_INDEX_NAME:     ${{ vars.SEARCH_INDEX_NAME }}
      VOICELIVE_VOICE:       ${{ vars.VOICELIVE_VOICE }}
      BING_CONNECTION_NAME:  ${{ vars.BING_CONNECTION_NAME }}
      BING_CUSTOM_CONFIG_NAME: ${{ vars.BING_CUSTOM_CONFIG_NAME }}

      # ── Model deployment overrides (optional GitHub Variables) ──
      MODEL_NAME:            ${{ vars.MODEL_NAME }}
      MODEL_VERSION:         ${{ vars.MODEL_VERSION }}
      MODEL_DEPLOYMENT_NAME: ${{ vars.MODEL_DEPLOYMENT_NAME }}
      MODEL_SKU_NAME:        ${{ vars.MODEL_SKU_NAME }}
      MODEL_CAPACITY:        ${{ vars.MODEL_CAPACITY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Log in to Azure (OIDC)
        run: |
          azd auth login \
            --client-id "$AZURE_CLIENT_ID" \
            --federated-credential-provider github \
            --tenant-id "$AZURE_TENANT_ID"

      # The BYO RBAC postprovision script (scripts/grant_byo_rbac.py) uses `az`
      # rather than `azd`, so authenticate the az CLI too. No-op for greenfield.
      - name: Log in to Azure CLI (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Provision infrastructure
        run: azd provision --no-prompt

      - name: Deploy application
        run: azd deploy --no-prompt